packages:
  - website
  - packages/*

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true
  workerd: true

catalogs:
  build:
    "@tsdown/css": ^0.22.0
    "@vitejs/plugin-vue": ^6.0.3
    "@unocss/reset": ^66.5.9
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vite-plus: latest
    typescript: ^6.0.3
    "@typescript/native-preview": 7.0.0-dev.20260509.2
    unocss: ^66.5.9
    unplugin-vue: ^7.0.1
    void: latest
    vue: ^3.5.25
    "@vueuse/core": ^14.1.0
  cli:
    bumpp: ^11.1.0
    cac: ^7.0.0
    picocolors: ^1.1.1
    "@oxc-node/cli": ^0.1.0
  icon:
    "@iconify-json/ph": ^1.2.2
  type:
    "@types/node": ^25.6.2

overrides:
  vite: "catalog:build"
  vitest: "catalog:build"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
