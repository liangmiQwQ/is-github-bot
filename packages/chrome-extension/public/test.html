<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Is GitHub Bot Test Page</title>
    <link rel="stylesheet" href="./test.css" />
  </head>
  <body>
    <main>
      <header>
        <p>Extension test page</p>
        <h1>Is GitHub Bot</h1>
      </header>

      <section>
        <h2>Avatar outline colors</h2>
        <div class="avatars">
          <figure>
            <span class="avatar human">H</span>
            <figcaption>Human</figcaption>
          </figure>
          <figure>
            <span class="avatar suspicious">S</span>
            <figcaption>Suspicious</figcaption>
          </figure>
          <figure>
            <span class="avatar bot">B</span>
            <figcaption>Bot</figcaption>
          </figure>
        </div>
      </section>

      <section>
        <h2>Manual GitHub checks</h2>
        <p>
          Open a GitHub issue, pull request, or personal profile after loading the unpacked
          extension.
        </p>
        <ul>
          <li>Issue or PR author avatar: 1px outline.</li>
          <li>Personal profile avatar: 2px outline.</li>
          <li>Organization profiles are skipped.</li>
        </ul>
      </section>
    </main>
  </body>
</html>
