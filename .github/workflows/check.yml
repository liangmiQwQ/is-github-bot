name: Check AI spammers

on:
  workflow_call:
    inputs:
      label-bot:
        type: string
        default: AI Bot
      label-suspicious:
        type: string
        default: Suspicious AI
      comment:
        type: boolean
        default: true
      comment-message:
        type: string
        default: |
          This issue / PR looks like it may be generated by an AI bot.

          If this is a real human contribution, please leave a short follow-up comment and we will be happy to review it.
      close:
        type: boolean
        default: false
      close-after-days:
        type: number
        default: 3
      close-message:
        type: string
        default: Closing this because it was marked as suspicious and there was no human follow-up.

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Resolve workflow ref
        id: workflow
        shell: bash
        run: echo "ref=${WORKFLOW_REF#*@}" >> "$GITHUB_OUTPUT"
        env:
          WORKFLOW_REF: ${{ github.workflow_ref }}

      - uses: actions/checkout@v6
        with:
          repository: liangmiQwQ/is-github-bot
          ref: ${{ steps.workflow.outputs.ref }}

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: true

      - name: Check author
        run: vp run is-github-bot#github-action
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_LABEL_BOT: ${{ inputs.label-bot }}
          INPUT_LABEL_SUSPICIOUS: ${{ inputs.label-suspicious }}
          INPUT_COMMENT: ${{ inputs.comment }}
          INPUT_COMMENT_MESSAGE: ${{ inputs.comment-message }}
          INPUT_CLOSE: ${{ inputs.close }}
          INPUT_CLOSE_AFTER_DAYS: ${{ inputs.close-after-days }}
          INPUT_CLOSE_MESSAGE: ${{ inputs.close-message }}
