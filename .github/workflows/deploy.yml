name: Deploy

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true
          run-install: true

      - run: vpx void deploy
        working-directory: website
        env:
          VOID_TOKEN: ${{ secrets.VOID_TOKEN }}
          VOID_PROJECT: ${{ secrets.VOID_PROJECT }}
